name: Analytics Service CI/CD

on:
  push:
    branches: [main]

jobs:
  # ── 1단계: CI (빌드 & 정합성 테스트) ────────────────────────
  ci:
    name: CI — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests (parity — DB 불필요)
        run: ./gradlew --no-daemon test

  # ── 2단계: Docker 이미지 빌드 & Artifact Registry 푸시 ──────
  build-and-push:
    name: Build & Push Image
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/analytics:latest
            asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/analytics:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3단계: Cloud Run 배포 ─────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: capd-analytics
          image: asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/analytics:latest
          region: asia-northeast3
          flags: >-
            --service-account=capd-runner@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --set-env-vars=DB_URL=${{ secrets.ANALYTICS_DB_URL }},DB_USERNAME=${{ secrets.ANALYTICS_DB_USERNAME }},DB_PASSWORD=${{ secrets.ANALYTICS_DB_PASSWORD }},SECRET_KEY=${{ secrets.SECRET_KEY }}
            --allow-unauthenticated
            --port=8090
            --memory=512Mi
            --cpu=1
            --cpu-boost
            --timeout=300
